<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KOSMO</title>
  </head>
  <body data-barba="wrapper">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="/" class="sidebar-item">Prototype</a>
        <div class="sidebar-section">Pages</div>
        <a href="/login.html" class="sidebar-item">Login</a>
        <a href="/email.html" class="sidebar-item">Email</a>
        <div class="sidebar-section">Components</div>
        <a href="/button.html" class="sidebar-item">Button</a>
        <a href="/input.html" class="sidebar-item">Input</a>
      </nav>
    </aside>
    <main data-barba="container" data-barba-namespace="home">
      <aside class="anim-settings">
        <div class="anim-settings-header">
          <h2 class="anim-settings-title">Animation</h2>
          <button class="anim-save-btn" id="anim-save">Save</button>
        </div>

        <details class="anim-section" open>
          <summary class="anim-section-header">Title</summary>
          <div class="anim-section-body">
            <div class="anim-prop">
              <span class="anim-prop-label">Position</span>
              <div class="anim-prop-controls">
                <label class="anim-field">
                  <span class="anim-field-label">Direction</span>
                  <select class="anim-direction" data-anim-target="title">
                    <option value="left" selected>Left</option>
                    <option value="right">Right</option>
                    <option value="up">Up</option>
                    <option value="down">Down</option>
                  </select>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Distance</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-duration anim-distance" data-anim-target="title" value="16" min="0" step="1" />
                    <span class="anim-duration-unit">px</span>
                  </div>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Curve</span>
                  <select class="anim-select" data-anim-target="title" data-anim-prop="position"></select>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Duration</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-duration" data-anim-target="title" data-anim-prop="position" value="300" min="0" step="50" />
                    <span class="anim-duration-unit">ms</span>
                  </div>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Delay</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-delay" data-anim-target="title" data-anim-prop="position" value="0" min="0" step="50" />
                    <span class="anim-duration-unit">ms</span>
                  </div>
                </label>
              </div>
            </div>
            <div class="anim-prop">
              <span class="anim-prop-label">Opacity</span>
              <div class="anim-prop-controls">
                <label class="anim-field">
                  <span class="anim-field-label">Curve</span>
                  <select class="anim-select" data-anim-target="title" data-anim-prop="opacity"></select>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Duration</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-duration" data-anim-target="title" data-anim-prop="opacity" value="300" min="0" step="50" />
                    <span class="anim-duration-unit">ms</span>
                  </div>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Delay</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-delay" data-anim-target="title" data-anim-prop="opacity" value="0" min="0" step="50" />
                    <span class="anim-duration-unit">ms</span>
                  </div>
                </label>
              </div>
            </div>
            <div class="anim-prop">
              <span class="anim-prop-label">Scale</span>
              <div class="anim-prop-controls">
                <label class="anim-field">
                  <span class="anim-field-label">End</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-duration anim-scale-end" data-anim-target="title" value="1" min="0" max="2" step="0.05" />
                  </div>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Curve</span>
                  <select class="anim-select" data-anim-target="title" data-anim-prop="scale"></select>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Duration</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-duration" data-anim-target="title" data-anim-prop="scale" value="300" min="0" step="50" />
                    <span class="anim-duration-unit">ms</span>
                  </div>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Delay</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-delay" data-anim-target="title" data-anim-prop="scale" value="0" min="0" step="50" />
                    <span class="anim-duration-unit">ms</span>
                  </div>
                </label>
              </div>
            </div>
          </div>
        </details>

        <details class="anim-section" open>
          <summary class="anim-section-header">Hedgehog</summary>
          <div class="anim-section-body">
            <div class="anim-prop">
              <span class="anim-prop-label">Position</span>
              <div class="anim-prop-controls">
                <label class="anim-field">
                  <span class="anim-field-label">Direction</span>

                    <option value="up">Up</option>
                    <option value="down">Down</option>

                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Distance</span>

                    <input type="number" class="anim-duration anim-distance" data-anim-target="hedgehog" value="16" min="0" step="1" />
                    <span class="anim-duration-unit">px</span>
                  </div>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Curve</span>
                  <select class="anim-select" data-anim-target="hedgehog" data-anim-prop="position"></select>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Duration</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-duration" data-anim-target="hedgehog" data-anim-prop="position" value="300" min="0" step="50" />
                    <span class="anim-duration-unit">ms</span>
                  </div>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Delay</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-delay" data-anim-target="hedgehog" data-anim-prop="position" value="0" min="0" step="50" />
                    <span class="anim-duration-unit">ms</span>
                  </div>
                </label>
              </div>
            </div>
            <div class="anim-prop">
              <span class="anim-prop-label">Opacity</span>
              <div class="anim-prop-controls">
                <label class="anim-field">
                  <span class="anim-field-label">Curve</span>
                  <select class="anim-select" data-anim-target="hedgehog" data-anim-prop="opacity"></select>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Duration</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-duration" data-anim-target="hedgehog" data-anim-prop="opacity" value="300" min="0" step="50" />
                    <span class="anim-duration-unit">ms</span>
                  </div>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Delay</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-delay" data-anim-target="hedgehog" data-anim-prop="opacity" value="0" min="0" step="50" />
                    <span class="anim-duration-unit">ms</span>
                  </div>
                </label>
              </div>
            </div>
            <div class="anim-prop">
              <span class="anim-prop-label">Scale</span>
              <div class="anim-prop-controls">
                <label class="anim-field">
                  <span class="anim-field-label">End</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-duration anim-scale-end" data-anim-target="hedgehog" value="1" min="0" max="2" step="0.05" />
                  </div>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Curve</span>
                  <select class="anim-select" data-anim-target="hedgehog" data-anim-prop="scale"></select>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Duration</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-duration" data-anim-target="hedgehog" data-anim-prop="scale" value="300" min="0" step="50" />
                    <span class="anim-duration-unit">ms</span>
                  </div>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Delay</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-delay" data-anim-target="hedgehog" data-anim-prop="scale" value="0" min="0" step="50" />
                    <span class="anim-duration-unit">ms</span>
                  </div>
                </label>
              </div>
            </div>
          </div>
        </details>

        <details class="anim-section" open>
          <summary class="anim-section-header">Login Button</summary>
          <div class="anim-section-body">
            <div class="anim-prop">
              <span class="anim-prop-label">Opacity</span>
              <div class="anim-prop-controls">
                <label class="anim-field">
                  <span class="anim-field-label">Curve</span>
                  <select class="anim-select" data-anim-target="button" data-anim-prop="opacity"></select>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Duration</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-duration" data-anim-target="button" data-anim-prop="opacity" value="300" min="0" step="50" />
                    <span class="anim-duration-unit">ms</span>
                  </div>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Delay</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-delay" data-anim-target="button" data-anim-prop="opacity" value="0" min="0" step="50" />
                    <span class="anim-duration-unit">ms</span>
                  </div>
                </label>
              </div>
            </div>
            <div class="anim-prop">
              <span class="anim-prop-label">Scale</span>
              <div class="anim-prop-controls">
                <label class="anim-field">
                  <span class="anim-field-label">End</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-duration anim-scale-end" data-anim-target="button" value="1" min="0" max="2" step="0.05" />
                  </div>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Curve</span>
                  <select class="anim-select" data-anim-target="button" data-anim-prop="scale"></select>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Duration</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-duration" data-anim-target="button" data-anim-prop="scale" value="300" min="0" step="50" />
                    <span class="anim-duration-unit">ms</span>
                  </div>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Delay</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-delay" data-anim-target="button" data-anim-prop="scale" value="0" min="0" step="50" />
                    <span class="anim-duration-unit">ms</span>
                  </div>
                </label>
              </div>
            </div>
          </div>
        </details>

        <details class="anim-section" open>
          <summary class="anim-section-header">Background</summary>
          <div class="anim-section-body">
            <div class="anim-prop">
              <span class="anim-prop-label">Color</span>
              <div class="anim-prop-controls">
                <label class="anim-field">
                  <span class="anim-field-label">Curve</span>
                  <select class="anim-select" data-anim-target="background" data-anim-prop="color"></select>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Duration</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-duration" data-anim-target="background" data-anim-prop="color" value="300" min="0" step="50" />
                    <span class="anim-duration-unit">ms</span>
                  </div>
                </label>
                <label class="anim-field">
                  <span class="anim-field-label">Delay</span>
                  <div class="anim-duration-wrap">
                    <input type="number" class="anim-delay" data-anim-target="background" data-anim-prop="color" value="0" min="0" step="50" />
                    <span class="anim-duration-unit">ms</span>
                  </div>
                </label>
              </div>
            </div>
          </div>
        </details>
      </aside>

      <div class="prototype-area">
        <div class="plugin-container">
          <div class="plugin-header">
            <div class="plugin-favicon">K</div>
            <span class="plugin-title">Kosmo</span>
            <button class="plugin-close" aria-label="Close">
              <img src="/src/assets/cross-icon.svg" alt="" width="16" height="16" />
            </button>
          </div>
          <div class="plugin-body">
            <div class="login-page">
              <h1 class="login-title">
                <span class="login-title-bold">Kosmo </span>
                <span class="login-title-regular">.Codes</span>
              </h1>
              <div class="login-hedgehog-wrapper">
                <img class="login-hedgehog" src="/src/assets/hedgehog.svg" alt="Kosmo hedgehog mascot" />
              </div>
              <button class="kosmo-btn login-btn">
                <span class="kosmo-btn-face">Login</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
