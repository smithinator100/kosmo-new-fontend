<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tab bar - KOSMO</title>
  </head>
  <body data-barba="wrapper">
    <!-- @include sidebar.html -->
    <main data-barba="container" data-barba-namespace="tab-bar">
      <article class="component-docs" data-docs-root data-component="tab-bar">
        <header class="component-docs-header">
          <h1 class="component-docs-title">Tab bar</h1>
          <p class="component-docs-subtitle">
            ARIA tabs pattern with arrow-key navigation, roving tabindex, and an
            active-tab indicator coloured by `--ks-page-color-tab-indicator`.
          </p>
        </header>

        <section>
          <h2 class="component-docs-section-title">Examples</h2>
          <div class="component-docs-examples" data-docs="examples"></div>
        </section>

        <section>
          <h2 class="component-docs-section-title">Usage</h2>
          <div data-docs="usage"></div>
        </section>

        <section>
          <h2 class="component-docs-section-title">Props</h2>
          <div data-docs="props"></div>
        </section>
      </article>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
