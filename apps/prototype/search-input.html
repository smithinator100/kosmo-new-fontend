<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search input - KOSMO</title>
  </head>
  <body data-barba="wrapper">
    <!-- @include sidebar.html -->
    <main data-barba="container" data-barba-namespace="search-input">
      <article class="component-docs" data-docs-root data-component="search">
        <header class="component-docs-header">

          <div class="component-docs-examples" data-docs="examples"></div>

        <section>

          <div data-docs="usage"></div>
        </section>

        <section>
          <h2 class="component-docs-section-title">Props</h2>
          <div data-docs="props"></div>
        </section>
      </article>

    <script type="module" src="/src/main.ts"></script>
