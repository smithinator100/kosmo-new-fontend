<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email - KOSMO</title>
  </head>
  <body data-barba="wrapper">
    <!-- @include sidebar.html -->
    <main data-barba="container" data-barba-namespace="email">
      <div class="email-page">
        <p class="email-title">email address?</p>
        <div class="kosmo-input">
          <label class="kosmo-input-face">
            <input type="email" class="kosmo-input-field" />
            <i data-lucide="corner-down-left" class="kosmo-input-arrow" aria-hidden="true"></i>
          </label>
        </div>
        <img class="email-doodle" src="/src/assets/yeti.svg" alt="" />
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
