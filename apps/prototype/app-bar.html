<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App-bar - KOSMO</title>
  </head>
  <body data-barba="wrapper">
    <!-- @include sidebar.html -->
    <main data-barba="container" data-barba-namespace="app-bar">
      <article class="component-docs" data-docs-root data-component="app-bar">
        <header class="component-docs-header">
          <h1 class="component-docs-title">App-bar</h1>
          <p class="component-docs-subtitle">
            Compact horizontal toolbar — leading action · centered title ·
            trailing actions. Used at the top of plugin frames and
            full-screen sheets.
          </p>
        </header>

        <section>
          <h2 class="component-docs-section-title">Examples</h2>
          <div class="component-docs-examples" data-docs="examples"></div>
        </section>

        <section>
          <h2 class="component-docs-section-title">Usage</h2>
          <div data-docs="usage"></div>
        </section>

        <section>
          <h2 class="component-docs-section-title">Props</h2>
          <div data-docs="props"></div>
        </section>
      </article>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
