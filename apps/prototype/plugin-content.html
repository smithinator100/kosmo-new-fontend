<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plugin Content - KOSMO</title>
  </head>
  <body data-barba="wrapper">
    <!-- @include sidebar.html -->
    <main data-barba="container" data-barba-namespace="plugin-content">
      <div class="plugin-content-page">
        <div class="plugin-content-frame">
          <div class="kosmo-app-bar" role="toolbar" aria-label="Plugin actions">
            <button class="kosmo-app-bar__icon-btn kosmo-app-bar__icon-btn--default" type="button" aria-label="Back">
              <i data-lucide="chevron-left"></i>
            </button>
            <button class="kosmo-app-bar__icon-btn kosmo-app-bar__icon-btn--default is-hidden" type="button" aria-hidden="true" tabindex="-1" aria-label="">
              <i data-lucide="chevron-left"></i>
            </button>
            <span class="kosmo-app-bar__title">v1.0</span>
            <button class="kosmo-app-bar__icon-btn kosmo-app-bar__icon-btn--favourite" type="button" aria-label="Remove from favourites">
              <i data-lucide="star"></i>
            </button>
            <button class="kosmo-app-bar__icon-btn kosmo-app-bar__icon-btn--default" type="button" aria-label="Delete plugin">
              <i data-lucide="trash-2"></i>
            </button>
          </div>
          <div class="plugin-content-inner">
            <div class="plugin-content-body">
              <img class="plugin-content-doodle" src="/src/assets/happy-cloud.svg" alt="" />
              <div class="plugin-content-text">
                <h2 class="plugin-content-title">random shapes</h2>
                <p class="plugin-content-description">Creates random shapes on the canvas with customizable colors.</p>
              </div>
            </div>
            <div class="plugin-content-actions">
              <button class="kosmo-btn kosmo-btn--outline">
                <span class="kosmo-btn-face">Update plugin</span>
              </button>
              <button class="kosmo-btn kosmo-btn--yellow">
                <span class="kosmo-btn-face">Run</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
