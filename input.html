<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input - KOSMO</title>
  </head>
  <body data-barba="wrapper">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="/" class="sidebar-item">Prototype</a>
        <div class="sidebar-section">Pages</div>
        <a href="/login.html" class="sidebar-item">Login</a>
        <a href="/email.html" class="sidebar-item">Email</a>
        <div class="sidebar-section">Components</div>
        <a href="/button.html" class="sidebar-item">Button</a>
        <a href="/input.html" class="sidebar-item">Input</a>
      </nav>
    </aside>
    <main data-barba="container" data-barba-namespace="input">
      <div class="component-preview">
        <h2 class="component-preview-title">Input</h2>
        <div class="component-preview-section">
          <span class="component-preview-label">Default</span>
          <div class="kosmo-input">
            <label class="kosmo-input-face">
              <input type="email" class="kosmo-input-field" />
              <i data-lucide="corner-down-left" class="kosmo-input-arrow" aria-hidden="true"></i>
            </label>
          </div>
        </div>
        <div class="component-preview-section">
          <span class="component-preview-label">Focused</span>
          <div class="kosmo-input is-focused">
            <label class="kosmo-input-face">
              <input type="email" class="kosmo-input-field" value="joebloggs@gmail.com" />
              <i data-lucide="corner-down-left"></i>
            </label>
          </div>
        </div>
        <div class="component-preview-section">
          <span class="component-preview-label">Error</span>
          <div class="kosmo-input is-error">
            <label class="kosmo-input-face">
              <input type="email" class="kosmo-input-field" value="joebloggs@gmail.com" />
              <i data-lucide="skull"></i>
            </label>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
